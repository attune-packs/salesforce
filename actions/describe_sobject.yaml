ref: salesforce.describe_sobject
label: "Salesforce Describe SObject"
description: "Return field, relationship, and metadata describe info for a Salesforce sObject."
enabled: true

runner_type: python
entry_point: describe_sobject.py
parameter_delivery: stdin
parameter_format: json
output_format: json

parameters:
  credential_key:
    type: string
    required: true
    description: "Pack-scoped keystore key ref containing the Salesforce credentials object. Required. Looked up via the execution token at runtime; doubles as the sf-toolkit connection name and as the prefix for the cached session-token keystore entry (`<credential_key>_session_token`)."
  instance_url:
    { type: string, description: "Optional explicit instance URL (overrides what lazy_login returns)." }
  api_version:
    { type: string, default: "v60.0" }

  sobject: { type: string, required: true }

output_schema:
  ok:       { type: boolean }
  describe: { type: object, description: "Full describe payload (fields[], childRelationships[], recordTypeInfos[], etc.)." }

tags: [salesforce, metadata]
