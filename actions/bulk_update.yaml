ref: salesforce.bulk_update
label: "Salesforce Bulk Update"
description: |
  Update a large array of records via Bulk API 2.0. Each record must
  include the `Id` field. Records can be supplied inline via `records[]`
  for small batches, or by referencing an Attune artifact
  (`input_artifact_ref` or `input_artifact_id`) holding CSV, JSON, or
  JSONL — useful when the dataset is too large to fit in execution
  parameters.
enabled: true

runner_type: python
entry_point: bulk_update.py
parameter_delivery: stdin
parameter_format: json
output_format: json

parameters:
  credential_key:
    type: string
    description: "Pack-scoped keystore key ref containing the Salesforce credentials object."
  credentials:
    type: object
    description: "Optional Salesforce credentials object passed directly to sf_toolkit.lazy_login. Takes precedence over credential_key and supports fields such as username, password, consumer_key or client_id, consumer_secret or client_secret, private_key, domain, and security_token."
  connection_name:
    type: string
    description: "Optional in-process connection cache name when using direct credentials. Defaults to a hash of the credential fields."
  instance_url:
    { type: string, description: "Optional explicit instance URL." }
  api_version:
    { type: string, default: "v60.0" }

  sobject:
    { type: string, required: true }

  records:
    type: array
    description: "Inline records as flat field maps (each must include `Id`). Used when no input artifact is provided."
  input_artifact_ref:
    type: string
    description: "Attune artifact ref to read records from (CSV, JSON array, or JSONL)."
  input_artifact_id:
    type: integer
    description: "Attune artifact ID (alternative to `input_artifact_ref`). Takes precedence."
  input_artifact_version:
    type: integer
    description: "Specific version of the input artifact (defaults to latest)."

  poll_interval_seconds: { type: number,  default: 2 }
  timeout_seconds:       { type: integer, default: 600 }

output_schema:
  ok:                { type: boolean }
  job_id:            { type: string }
  state:             { type: string }
  records_input:     { type: integer }
  records_processed: { type: integer }
  records_failed:    { type: integer }

tags: [salesforce, bulk, write]
