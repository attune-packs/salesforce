ref: salesforce.execute_apex
label: "Salesforce Execute Anonymous Apex"
description: "Execute anonymous Apex code via the Tooling API and return compile/execution results."
enabled: true

runner_type: python
entry_point: execute_apex.py
parameter_delivery: stdin
parameter_format: json
output_format: json

parameters:
  credential_key:
    type: string
    required: true
    description: "Pack-scoped keystore key ref containing the Salesforce credentials object. Required. Looked up via the execution token at runtime; doubles as the sf-toolkit connection name and as the prefix for the cached session-token keystore entry (`<credential_key>_session_token`)."
  instance_url:
    { type: string, description: "Optional explicit instance URL (overrides what lazy_login returns)." }
  api_version:
    { type: string, default: "v60.0" }

  apex: { type: string, required: true, description: "Anonymous Apex code to execute." }

output_schema:
  ok:              { type: boolean, description: "True if compiled and executed without errors." }
  compiled:        { type: boolean }
  success:         { type: boolean }
  compile_problem: { type: string }
  exception_message: { type: string }
  exception_stack:   { type: string }
  line:    { type: integer }
  column:  { type: integer }
  result:  { type: object, description: "Full Tooling API response." }

tags: [salesforce, apex, tooling]
